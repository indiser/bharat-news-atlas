name: Hourly News Fetcher & Database Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy psycopg2-binary feedparser aiohttp python-dotenv pytz 

      - name: Run Pipeline and Update Neon Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python seed.py
